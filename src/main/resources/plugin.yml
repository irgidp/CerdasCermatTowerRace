name: cerdasCermatTowerRace
version: '${version}'

main: yt.corazonid.cerdasCermatTowerRace.CerdasCermatTowerRace
api-version: '1.21.11'
load: POSTWORLD

commands:
  regis:
    description: Register player asli ke game
    usage: /regis <playername>
    permission: mathtower.admin
  unregis:
    description: Unregister player dari game
    usage: /unregis <playername>
    permission: mathtower.admin
  addbot:
    description: Tambahkan bot simulasi ke game
    usage: /addbot <nama> [easy|medium|hard|random]
    permission: mathtower.admin
  removebot:
    description: Hapus bot dari game
    usage: /removebot <nama>
    permission: mathtower.admin
  listplayer:
    description: Lihat daftar semua player + bot beserta score
    usage: /listplayer
    permission: mathtower.admin
  startboard:
    description: Spawn pijakan sesuai jumlah player/bot yang terdaftar
    usage: /startboard
    permission: mathtower.admin
  startgame:
    description: Mulai game session
    usage: /startgame
    permission: mathtower.admin
  setsoal:
    description: Set soal untuk semua player (bot jawab otomatis)
    usage: /setsoal <question_id>
    permission: mathtower.admin
  resetgame:
    description: Reset game dan bersihkan arena
    usage: /resetgame
    permission: mathtower.admin

permissions:
  mathtower.admin:
    description: Admin commands untuk Math Tower Race
    default: op
  mathtower.player:
    description: Player biasa
    default: true
